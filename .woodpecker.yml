when:
  - event: [push, pull_request]

# We previously used cimg/android, but its ~7 GB compressed size kept
# timing out the Woodpecker runner's image pull (status `Exception`,
# pipeline never started). eclipse-temurin:21-jdk weighs ~400 MB and
# we install just the SDK pieces we need on demand. The SDK lives at
# /opt/android-sdk so it's root-readable regardless of the UID
# Woodpecker uses for subsequent stages.

steps:
  - name: build
    image: eclipse-temurin:21-jdk
    environment:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
    commands:
      - apt-get update -qq && apt-get install -y -qq curl unzip git >/dev/null
      - mkdir -p /opt/android-sdk/cmdline-tools
      - curl -fsSL -o /tmp/cmdline.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
      - unzip -q /tmp/cmdline.zip -d /tmp/cmdline-extract
      - mv /tmp/cmdline-extract/cmdline-tools /opt/android-sdk/cmdline-tools/latest
      - export PATH=/opt/android-sdk/cmdline-tools/latest/bin:$PATH
      - yes | sdkmanager --licenses >/dev/null 2>&1 || true
      - sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - ./gradlew --no-daemon ktlintCheck lintDebug testDebugUnitTest assembleDebug
      - mkdir -p artifacts
      - cp app/build/outputs/apk/debug/*.apk artifacts/

  - name: publish-artifact
    image: plugins/gitea-release
    when:
      - event: push
        branch: main
    settings:
      api_key:
        from_secret: gitea_token
      base_url: https://gitea.macecloud.co.uk
      files: artifacts/*.apk
      title: "crate-android ${CI_COMMIT_SHA:0:8}"
      prerelease: true
